<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Horn (left beak) -->
  <path d="M7 13.5 Q2 16 1 18.5 Q3 19.5 7 18.5 Z" fill="#cc4400"/>
  <!-- Main body -->
  <rect x="7" y="11.5" width="22" height="9" rx="1.2" fill="#cc4400"/>
  <!-- Waist -->
  <rect x="10" y="20" width="16" height="2.5" rx="1" fill="#992200"/>
  <!-- Left foot -->
  <rect x="8"  y="22" width="6" height="4.5" rx="1" fill="#992200"/>
  <!-- Right foot -->
  <rect x="18" y="22" width="6" height="4.5" rx="1" fill="#992200"/>
  <!-- Top face (hot/glowing) -->
  <rect x="4.5" y="8" width="23" height="4.5" rx="1.2" fill="#ff8c00"/>
  <!-- Highlight edge on top face -->
  <rect x="4.5" y="8" width="23" height="1.2" rx="1" fill="#ffcc66" opacity="0.6"/>
  <!-- Ember dot on top -->
  <circle cx="16" cy="10" r="1.2" fill="#fff" opacity="0.7"/>
</svg>
